<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../LOGO DE LA EMPRESA/La-pura-letra-logo.png">
    <link rel="shortcut icon" href="../LOGO DE LA EMPRESA/La-pura-letra-logo.png">
    <link rel="apple-touch-icon" href="../LOGO DE LA EMPRESA/La-pura-letra-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="registro.css">
</head>
<body class="auth-login-page">
    <header class="topbar">
        <nav class="topbar-links topbar-help">
            <a href="../index.html">Inicio</a>
            <a href="../ayuda/centro-ayuda.html">Ayuda</a>
        </nav>
    </header>

    <main class="page">
        <section class="hero auth-hero">
            <img class="auth-hero-logo" src="../LOGO DE LA EMPRESA/LOGO.jpeg" alt="Logo principal Smucky">
            <h2 class="auth-hero-brand">SMUCKY´s By CHAVAMON</h2>
            <h1>Crear cuenta</h1>
        </section>

        <section class="form-wrap">
            <form id="registerForm">
                <label for="name">Nombre completo</label>
                <input id="name" type="text" placeholder="Tu nombre" autocomplete="name" required>

                <p id="regError" class="register-message register-message-error" aria-live="polite"></p>
                <p id="regNotice" class="register-message register-message-ok" aria-live="polite"></p>

                <label for="newEmail">Correo electronico</label>
                <input id="newEmail" type="email" placeholder="tu@email.com" autocomplete="email" required>

                <label for="newPassword">Contrasena</label>
                <div class="password-input-wrap">
                    <input id="newPassword" type="password" placeholder="Minimo 8 caracteres" autocomplete="new-password" minlength="8" required>
                    <button type="button" class="password-toggle" data-target="newPassword" aria-label="Mostrar contrasena"></button>
                </div>

                <label for="confirmPassword">Repite tu contrasena</label>
                <div class="password-input-wrap">
                    <input id="confirmPassword" type="password" placeholder="Vuelve a escribir tu contrasena" autocomplete="new-password" minlength="8" required>
                    <button type="button" class="password-toggle" data-target="confirmPassword" aria-label="Mostrar contrasena"></button>
                </div>

                <label for="city">Ciudad</label>
                <input id="city" type="text" placeholder="Tu ciudad" autocomplete="address-level2" required>

                <div id="verificationWrap" class="verification-wrap" hidden>
                    <label for="verificationCode">Codigo de verificacion</label>
                    <input id="verificationCode" type="text" inputmode="numeric" maxlength="6" placeholder="Escribe el codigo que recibiste por correo">
                </div>

                <button type="submit">Crear cuenta</button>
                <p class="register-inline">Ya tienes cuenta? <a href="login.html">Inicia sesion aqui</a></p>
            </form>
        </section>
    </main>
    <script src="../servicios/auth.js"></script>
    <script type="module" src="../scripts/pages/registro.js"></script>
    <script src="../scripts/pages/menu-global.js"></script>
</body>
</html>
