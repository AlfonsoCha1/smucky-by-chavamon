<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta | SMUCKY'S BY CHAVAMON</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../LOGO DE LA EMPRESA/La-pura-letra-logo.png">
    <link rel="shortcut icon" href="../LOGO DE LA EMPRESA/La-pura-letra-logo.png">
    <link rel="apple-touch-icon" href="../LOGO DE LA EMPRESA/La-pura-letra-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <main class="auth-page">
        <div class="bg-light bg-light-1"></div>
        <div class="bg-light bg-light-2"></div>
        <div class="bg-light bg-light-3"></div>

        <section class="auth-card auth-card-register">
            <div class="brand-area">
                <img src="../LOGO DE LA EMPRESA/LOGO.jpeg" alt="Logo SMUCKY'S BY CHAVAMON" class="brand-logo">
                <p class="brand-name">SMUCKY'S BY CHAVAMON</p>
            </div>

            <div class="title-area">
                <h1>Crear cuenta</h1>
                <p>Regístrate y comienza a formar parte de la marca.</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <label for="name">Nombre completo</label>
                    <input id="name" type="text" name="name" placeholder="Nombre completo" autocomplete="name" required>
                </div>

                <p id="regError" class="register-message register-message-error" aria-live="polite"></p>
                <p id="regNotice" class="register-message register-message-ok" aria-live="polite"></p>

                <div class="input-group">
                    <label for="newEmail">Correo electronico</label>
                    <input id="newEmail" type="email" name="email" placeholder="Correo electrónico" autocomplete="email" required>
                </div>

                <div class="grid-two">
                    <div class="input-group">
                        <label for="newPassword">Contrasena</label>
                        <div class="password-input-wrap">
                            <input id="newPassword" type="password" name="password" placeholder="Contraseña" autocomplete="new-password" minlength="8" required>
                            <button type="button" class="password-toggle" data-target="newPassword" aria-label="Mostrar contrasena"></button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirmPassword">Confirmar contrasena</label>
                        <div class="password-input-wrap">
                            <input id="confirmPassword" type="password" name="confirmPassword" placeholder="Confirmar contraseña" autocomplete="new-password" minlength="8" required>
                            <button type="button" class="password-toggle" data-target="confirmPassword" aria-label="Mostrar contrasena"></button>
                        </div>
                    </div>
                </div>

                <div class="grid-two">
                    <div class="input-group">
                        <label for="city">Ciudad</label>
                        <input id="city" type="text" name="city" placeholder="Ciudad" autocomplete="address-level2" required>
                    </div>
                    <div class="input-group">
                        <label for="birthdate">Fecha de cumpleanos</label>
                        <div class="birthday-field-row">
                            <span class="birthday-icon" aria-hidden="true">🎂</span>
                            <input id="birthdate" type="text" placeholder="24/11/1999" autocomplete="bday" inputmode="numeric" maxlength="10" required>
                        </div>
                    </div>
                </div>

                <div class="grid-two">
                    <div class="input-group">
                        <label for="phone">Telefono</label>
                        <div class="phone-field-row">
                            <div class="phone-country-wrap">
                                <select id="phoneCountry" class="phone-country-select" aria-label="Pais del telefono" autocomplete="country-name" required>
                                    <option value="MX" data-code="+52">🇲🇽 Mexico (+52)</option>
                                    <option value="US" data-code="+1">🇺🇸 Estados Unidos (+1)</option>
                                    <option value="CA" data-code="+1">🇨🇦 Canada (+1)</option>
                                    <option value="AR" data-code="+54">🇦🇷 Argentina (+54)</option>
                                    <option value="BO" data-code="+591">🇧🇴 Bolivia (+591)</option>
                                    <option value="BR" data-code="+55">🇧🇷 Brasil (+55)</option>
                                    <option value="CL" data-code="+56">🇨🇱 Chile (+56)</option>
                                    <option value="CO" data-code="+57">🇨🇴 Colombia (+57)</option>
                                    <option value="CR" data-code="+506">🇨🇷 Costa Rica (+506)</option>
                                    <option value="EC" data-code="+593">🇪🇨 Ecuador (+593)</option>
                                    <option value="SV" data-code="+503">🇸🇻 El Salvador (+503)</option>
                                    <option value="ES" data-code="+34">🇪🇸 España (+34)</option>
                                    <option value="GT" data-code="+502">🇬🇹 Guatemala (+502)</option>
                                    <option value="HN" data-code="+504">🇭🇳 Honduras (+504)</option>
                                    <option value="NI" data-code="+505">🇳🇮 Nicaragua (+505)</option>
                                    <option value="PA" data-code="+507">🇵🇦 Panama (+507)</option>
                                    <option value="PY" data-code="+595">🇵🇾 Paraguay (+595)</option>
                                    <option value="PE" data-code="+51">🇵🇪 Peru (+51)</option>
                                    <option value="DO" data-code="+1">🇩🇴 Republica Dominicana (+1)</option>
                                    <option value="UY" data-code="+598">🇺🇾 Uruguay (+598)</option>
                                    <option value="VE" data-code="+58">🇻🇪 Venezuela (+58)</option>
                                </select>
                            </div>
                            <input id="phone" type="tel" placeholder="Numero de telefono" autocomplete="tel-national" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="zip">Codigo postal</label>
                        <input id="zip" type="text" name="zip" placeholder="Código postal" autocomplete="postal-code" required>
                    </div>
                </div>

                <div class="grid-two">
                    <div class="input-group">
                        <label for="street">Calle y numero</label>
                        <input id="street" type="text" name="street" placeholder="Calle y número" autocomplete="address-line1" required>
                    </div>

                    <div class="input-group">
                        <label for="colonia">Colonia</label>
                        <input id="colonia" type="text" name="colonia" placeholder="Colonia" autocomplete="address-line2" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="state">Estado</label>
                    <input id="state" type="text" name="state" placeholder="Estado" autocomplete="address-level1" required>
                </div>

                <div id="verificationWrap" class="verification-wrap" hidden>
                    <div class="input-group">
                        <label for="verificationCode">Codigo de verificacion</label>
                        <input id="verificationCode" type="text" name="code" inputmode="numeric" maxlength="6" placeholder="Código de verificación">
                    </div>
                </div>

                <p class="bottom-text top-gap">Ya tienes cuenta? <a href="login.html" class="auth-link strong-link">Iniciar sesión</a></p>
                <button type="submit" class="main-btn">Crear cuenta</button>
            </form>
        </section>
    </main>

    <script src="../servicios/carrito-favoritos.js"></script>
    <script src="../servicios/auth.js"></script>
    <script type="module" src="../scripts/pages/registro.js"></script>
    <script src="../scripts/pages/menu-global.js"></script>
</body>
</html>
